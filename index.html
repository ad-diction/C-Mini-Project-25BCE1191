<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Ticket Reservation System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #04060f;
    --panel:     #080c1a;
    --border:    #1a2540;
    --accent:    #f0a500;
    --accent2:   #e05c00;
    --cyan:      #00c9ff;
    --green:     #39ff8a;
    --red:       #ff4566;
    --text:      #c8d8f0;
    --muted:     #4a5a78;
    --mono:      'Space Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    overflow-x: hidden;
  }

  /* ── animated grid background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── glowing orbs ── */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,165,0,.07) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: translate(0,0); }
    to   { transform: translate(-60px, 80px); }
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown .6s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 10px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    letter-spacing: 6px;
    background: linear-gradient(135deg, #fff 30%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .header-sub {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ── MAIN LAYOUT ── */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp .7s ease both .1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .stat-card {
    flex: 1;
    min-width: 140px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color .2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-value.cyan  { color: var(--cyan); }
  .stat-value.green { color: var(--green); }

  /* ── TERMINAL ── */
  .terminal-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .terminal-titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #0a0f1f;
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .terminal-title {
    margin-left: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  #terminal {
    height: 400px;
    overflow-y: auto;
    padding: 18px 20px;
    font-size: 13px;
    line-height: 1.75;
    scroll-behavior: smooth;
  }

  #terminal::-webkit-scrollbar { width: 4px; }
  #terminal::-webkit-scrollbar-track { background: transparent; }
  #terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .line { display: block; }
  .line-out  { color: var(--text); }
  .line-head { color: var(--cyan); font-weight: 700; }
  .line-err  { color: var(--red); }
  .line-ok   { color: var(--green); }
  .line-in   { color: var(--muted); }
  .line-acc  { color: var(--accent); font-weight: 700; }

  /* line entrance animation */
  .line {
    animation: lineIn .12s ease both;
  }
  @keyframes lineIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── INPUT ROW ── */
  .input-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color .2s;
  }

  .input-section:focus-within { border-color: var(--accent); }

  .input-prefix {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 14px;
    caret-color: var(--accent);
  }

  #user-input::placeholder { color: var(--muted); font-size: 12px; }

  #send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 9px 22px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }

  #send-btn:hover   { opacity: .85; }
  #send-btn:active  { transform: scale(.97); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── QUICK BUTTONS ── */
  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qbtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 1px;
  }

  .qbtn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,165,0,.06);
  }

  /* ── CURSOR BLINK ── */
  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── HTML TABLES inside terminal ── */
  .t-block {
    display: block;
    margin: 10px 0;
    animation: lineIn .15s ease both;
  }

  .t-block table {
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12.5px;
    width: 100%;
    max-width: 700px;
  }

  .t-block th {
    background: #0d1630;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 11px;
    padding: 8px 14px;
    border: 1px solid #1e3058;
    text-align: left;
    white-space: nowrap;
  }

  .t-block td {
    padding: 7px 14px;
    border: 1px solid #141e38;
    color: var(--text);
    white-space: nowrap;
  }

  .t-block tr:nth-child(even) td { background: #080d1e; }
  .t-block tr:nth-child(odd)  td { background: #060b18; }
  .t-block tr:hover td { background: #0f1a30; }

  .t-block td.td-id     { color: var(--accent); font-weight: 700; }
  .t-block td.td-fare   { color: var(--green); }
  .t-block td.td-seats  { color: #a78bfa; }
  .t-block td.td-active { color: var(--green); font-weight: 700; }
  .t-block td.td-cancel { color: var(--red);   font-weight: 700; }
  .t-block td.td-rev    { color: var(--green); font-weight: 700; }

  /* ── TICKET CARD ── */
  .ticket-card {
    display: block;
    border: 1px solid var(--accent);
    border-radius: 10px;
    overflow: hidden;
    max-width: 420px;
    margin: 10px 0;
    animation: lineIn .2s ease both;
  }

  .ticket-header {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    padding: 9px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ticket-body {
    background: #07091a;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 16px;
    font-size: 12.5px;
  }

  .ticket-label { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; padding-top: 2px; }
  .ticket-value { color: #fff; font-weight: 700; }
  .ticket-value.route-val { color: var(--cyan); }
  .ticket-value.fare-val  { color: var(--green); }
  .ticket-value.id-val    { color: var(--accent); font-size: 1.1em; }

  /* ── MENU CARD ── */
  .menu-card {
    display: block;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    max-width: 480px;
    margin: 10px 0;
    animation: lineIn .2s ease both;
  }

  .menu-header {
    background: linear-gradient(135deg, #0d1630, #111e3a);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: var(--cyan);
  }

  .menu-hint {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .menu-grid {
    display: flex;
    flex-direction: column;
    background: #060b18;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    border-bottom: 1px solid #0e1628;
    cursor: pointer;
    transition: background .15s;
  }

  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: #0f1a30; }
  .menu-item:hover .menu-num { background: var(--accent); color: #000; }

  .menu-num {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: #0d1630;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }

  .menu-label {
    font-size: 13px;
    color: var(--text);
    letter-spacing: .5px;
  }

  .menu-exit .menu-num { color: var(--red); border-color: #3a1020; }
  .menu-exit .menu-label { color: #888; }
  .menu-exit:hover { background: #1a080f; }
  .menu-exit:hover .menu-num { background: var(--red); color: #fff; }

  /* ── SEAT GRID ── */
  .seat-map-block {
    display: block;
    max-width: 560px;
    margin: 10px 0;
    animation: lineIn .2s ease both;
  }
  .seat-map-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    color: var(--cyan);
    font-size: 1rem;
    margin-bottom: 8px;
  }
  .seat-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .leg-box {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .leg-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid #333;
  }
  .seat-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 5px;
    max-width: 100%;
  }
  .seat-btn {
    aspect-ratio: 1;
    border-radius: 5px;
    border: 1px solid #1e3058;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .15s;
    min-width: 0;
    padding: 2px;
  }
  .seat-btn.free {
    background: #0a1f0a;
    color: #39ff8a;
    border-color: #1a4020;
  }
  .seat-btn.free:hover {
    background: #39ff8a;
    color: #000;
    border-color: #39ff8a;
    transform: scale(1.1);
  }
  .seat-btn.booked {
    background: #1a0a0a;
    color: #ff4566;
    border-color: #3a1020;
    cursor: not-allowed;
    opacity: .7;
  }
  .seat-avail-count {
    margin-top: 8px;
    font-size: 12px;
    color: var(--green);
  }

  /* ── ROUTE PICKER ── */
  .route-picker {
    display: block;
    max-width: 500px;
    margin: 10px 0;
    animation: lineIn .2s ease both;
  }
  .route-picker-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    color: var(--cyan);
    font-size: 1rem;
    margin-bottom: 8px;
  }
  .route-cards {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .route-card-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #060b18;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 16px;
    cursor: pointer;
    transition: all .15s;
    text-align: left;
  }
  .route-card-btn:hover {
    border-color: var(--accent);
    background: #0f1a30;
  }
  .route-card-btn:hover .rc-num { background: var(--accent); color: #000; }
  .rc-num {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: #0d1630;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .rc-info { flex: 1; }
  .rc-route { color: #fff; font-size: 13px; font-weight: 700; }
  .rc-fare  { color: var(--green); font-size: 11px; margin-top: 2px; }
  .rc-seats { color: #a78bfa; font-size: 11px; }

  .ticket-footer {
    background: #050710;
    border-top: 1px dashed #1a2540;
    padding: 8px 18px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">DA1 — C Mini Project</div>
  <h1>Bus Reservation System</h1>
  <p class="header-sub">Menu-driven · File Handling · Structs · Input Validation</p>
</div>

<div class="container">

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-label">Active Bookings</span>
      <span class="stat-value" id="stat-bookings">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Routes Available</span>
      <span class="stat-value cyan">3</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Total Revenue</span>
      <span class="stat-value green" id="stat-revenue">₹0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Seats Free</span>
      <span class="stat-value" id="stat-seats" style="color:#a78bfa">120</span>
    </div>
  </div>

  <!-- Terminal -->
  <div class="terminal-wrapper">
    <div class="terminal-titlebar">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <span class="terminal-title">bus_system.c — running</span>
    </div>
    <div id="terminal"></div>
  </div>

  <!-- Quick Action Buttons -->
  <div class="quick-btns">
    <button class="qbtn" onclick="quickSend('1')">① Routes</button>
    <button class="qbtn" onclick="quickSend('2')">② Seats</button>
    <button class="qbtn" onclick="quickSend('3')">③ Book</button>
    <button class="qbtn" onclick="quickSend('4')">④ Cancel</button>
    <button class="qbtn" onclick="quickSend('5')">⑤ Search</button>
    <button class="qbtn" onclick="quickSend('6')">⑥ Report</button>
    <button class="qbtn" onclick="quickSend('7')">⑦ Update</button>
    <button class="qbtn" onclick="quickSend('0')" style="border-color:#ff4566;color:#ff4566">⓪ Exit</button>
  </div>

  <!-- Input -->
  <div class="input-section">
    <span class="input-prefix">INPUT ▶</span>
    <input id="user-input" type="text" placeholder="Type your choice or value and press Enter…" autofocus />
    <button id="send-btn">SEND ↵</button>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const MAX_SEATS    = 40;
const MAX_ROUTES   = 3;
const MAX_BOOKINGS = 200;

const routes = [
  { routeID:1, source:"Chennai",   destination:"Bangalore",  fare:350, bookedSeats:new Array(MAX_SEATS).fill(0) },
  { routeID:2, source:"Bangalore", destination:"Hyderabad",  fare:450, bookedSeats:new Array(MAX_SEATS).fill(0) },
  { routeID:3, source:"Chennai",   destination:"Coimbatore", fare:280, bookedSeats:new Array(MAX_SEATS).fill(0) },
];

let bookings     = [];
let nextTicketID = 1001;

// ─────────────────────────────────────────────
// TERMINAL
// ─────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const inputEl  = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');

function print(text, cls='line-out') {
  text.split('\n').forEach(line => {
    const span = document.createElement('span');
    span.className = 'line ' + cls;
    span.textContent = line;
    terminal.appendChild(span);
  });
  terminal.scrollTop = terminal.scrollHeight;
  updateStats();
}
const pH = t => print(t,'line-head');
const pE = t => print(t,'line-err');
const pO = t => print(t,'line-ok');
const pA = t => print(t,'line-acc');

// ─────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────
function updateStats() {
  const active = bookings.filter(b => !b.isCancelled);
  document.getElementById('stat-bookings').textContent = active.length;
  document.getElementById('stat-revenue').textContent  = '₹' + active.reduce((s,b)=>s+b.farePaid,0).toLocaleString('en-IN');
  const free = routes.reduce((s,r)=>s+r.bookedSeats.filter(x=>x===0).length,0);
  document.getElementById('stat-seats').textContent    = free;
}

// ─────────────────────────────────────────────
// STATE MACHINE
// ─────────────────────────────────────────────
let state    = 'MENU';
let subState = null;
let tempData = {};

function handleInput(raw) {
  const val = raw.trim();
  if (!val) return;
  const echo = document.createElement('span');
  echo.className = 'line line-in';
  echo.textContent = '▶ ' + val;
  terminal.appendChild(echo);
  terminal.scrollTop = terminal.scrollHeight;

  if      (state==='MENU')   handleMenu(val);
  else if (state==='BOOK')   handleBook(val);
  else if (state==='CANCEL') handleCancel(val);
  else if (state==='SEARCH') handleSearch(val);
  else if (state==='UPDATE') handleUpdate(val);
  else if (state==='SEATS')  handleSeats(val);
  else if (state==='SEATS_ROUTE') handleSeatsRoute(val);
}

// ─────────────────────────────────────────────
// MENU
// ─────────────────────────────────────────────
function showMenu() {
  const menu = document.createElement('div');
  menu.className = 'menu-card';
  menu.innerHTML = `
    <div class="menu-header"><span>🚌 MAIN MENU</span><span class="menu-hint">click an option or type number + Enter</span></div>
    <div class="menu-grid">
      <div class="menu-item" onclick="quickSend('1')"><span class="menu-num">1</span><span class="menu-label">Display All Routes</span></div>
      <div class="menu-item" onclick="quickSend('2')"><span class="menu-num">2</span><span class="menu-label">Display Available Seats</span></div>
      <div class="menu-item" onclick="quickSend('3')"><span class="menu-num">3</span><span class="menu-label">Book Ticket</span></div>
      <div class="menu-item" onclick="quickSend('4')"><span class="menu-num">4</span><span class="menu-label">Cancel Ticket</span></div>
      <div class="menu-item" onclick="quickSend('5')"><span class="menu-num">5</span><span class="menu-label">Search Ticket by ID</span></div>
      <div class="menu-item" onclick="quickSend('6')"><span class="menu-num">6</span><span class="menu-label">Daily Collection Report</span></div>
      <div class="menu-item" onclick="quickSend('7')"><span class="menu-num">7</span><span class="menu-label">Update Passenger Name</span></div>
      <div class="menu-item menu-exit" onclick="quickSend('0')"><span class="menu-num">0</span><span class="menu-label">Exit</span></div>
    </div>`;
  terminal.appendChild(menu);
  terminal.scrollTop = terminal.scrollHeight;
}

function handleMenu(val) {
  const c = parseInt(val);
  if (isNaN(c)) { pE('Invalid input. Enter 0–7.'); showMenu(); return; }
  switch(c) {
    case 1: displayRoutes(); showMenu(); break;
    case 2: state='SEATS'; handleSeats(null); break;
    case 3: state='BOOK'; subState='ROUTE'; tempData={}; showRoutePicker('book'); break;
    case 4: state='CANCEL'; subState='ID'; print('Enter Ticket ID to cancel: '); break;
    case 5: state='SEARCH'; subState='ID'; print('Enter Ticket ID to search: '); break;
    case 6: dailyReport(); showMenu(); break;
    case 7: state='UPDATE'; subState='ID'; print('Enter Ticket ID to update: '); break;
    case 0:
      pO('');
      pO('  Thank you for using Bus Reservation System!');
      pO('  Goodbye 👋');
      inputEl.disabled = true; sendBtn.disabled = true;
      break;
    default: pE('Invalid choice. Enter 0–7.'); showMenu();
  }
}

// ─────────────────────────────────────────────
// DISPLAY ROUTES — real HTML table
// ─────────────────────────────────────────────
function displayRoutes() {
  let rows = '';
  routes.forEach(r => {
    const free = r.bookedSeats.filter(s=>s===0).length;
    const pct  = Math.round((free/MAX_SEATS)*100);
    rows += `<tr>
      <td class="td-id">${r.routeID}</td>
      <td>${r.source}</td>
      <td>${r.destination}</td>
      <td class="td-fare">₹${r.fare.toFixed(2)}</td>
      <td class="td-seats">${free} / ${MAX_SEATS}</td>
    </tr>`;
  });
  const block = document.createElement('div');
  block.className = 't-block';
  block.innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Source</th><th>Destination</th><th>Fare</th><th>Seats Free</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  terminal.appendChild(block);
  terminal.scrollTop = terminal.scrollHeight;
  updateStats();
}

// ─────────────────────────────────────────────
// SEATS
// ─────────────────────────────────────────────
function handleSeats(val) {
  // Show route picker, then after selection show seat map (view only)
  showRoutePicker('view');
  state = 'SEATS_ROUTE';
}

function handleSeatsRoute(val) {
  const r = parseInt(val);
  if (isNaN(r)||r<1||r>MAX_ROUTES) { pE('Invalid route.'); state='MENU'; showMenu(); return; }
  displaySeatGrid(r, false, null);
  state='MENU'; showMenu();
}

function displaySeatGrid(routeID, selectable, onSelect) {
  const r = routes[routeID-1];
  const free = r.bookedSeats.filter(x=>x===0).length;

  const seats = r.bookedSeats.map((booked, i) => {
    const num = i+1;
    const cls = booked ? 'seat-btn booked' : 'seat-btn free';
    const clickAttr = (!booked && selectable) ? `onclick="seatSelected(${num})"` : '';
    const title = booked ? `Seat ${num} — Booked` : `Seat ${num} — Available`;
    return `<div class="${cls}" ${clickAttr} title="${title}">${num}</div>`;
  }).join('');

  const block = document.createElement('div');
  block.className = 'seat-map-block';
  block.id = selectable ? 'active-seat-grid' : '';
  block.innerHTML = `
    <div class="seat-map-title">SEAT MAP — Route ${r.routeID}: ${r.source} → ${r.destination}</div>
    <div class="seat-legend">
      <span class="leg-box"><span class="leg-swatch" style="background:#0a1f0a;border-color:#1a4020"></span> Available ${selectable ? '(click to select)' : ''}</span>
      <span class="leg-box"><span class="leg-swatch" style="background:#1a0a0a;border-color:#3a1020"></span> Booked</span>
    </div>
    <div class="seat-grid">${seats}</div>
    <div class="seat-avail-count">${free} of ${MAX_SEATS} seats available</div>`;
  terminal.appendChild(block);
  terminal.scrollTop = terminal.scrollHeight;
  updateStats();
}

function seatSelected(seatNum) {
  // Remove click handlers to prevent double-select
  const grid = document.getElementById('active-seat-grid');
  if (grid) {
    grid.id = '';
    grid.querySelectorAll('.seat-btn.free').forEach(b => b.onclick = null);
    // Highlight selected seat
    grid.querySelectorAll('.seat-btn').forEach(b => {
      if (parseInt(b.textContent) === seatNum) {
        b.style.background = 'var(--accent)';
        b.style.color = '#000';
        b.style.borderColor = 'var(--accent)';
      }
    });
  }
  tempData.seat = seatNum;
  print(`Seat ${seatNum} selected.`);
  subState = 'NAME';
  print('Enter Passenger Name: ');
}

function showRoutePicker(mode) {
  const cards = routes.map(r => {
    const free = r.bookedSeats.filter(x=>x===0).length;
    const clickFn = mode === 'book' ? `bookRouteSelected(${r.routeID})` : `viewRouteSelected(${r.routeID})`;
    return `<button class="route-card-btn" onclick="${clickFn}">
      <span class="rc-num">${r.routeID}</span>
      <span class="rc-info">
        <div class="rc-route">${r.source} → ${r.destination}</div>
        <div style="display:flex;gap:12px;margin-top:3px">
          <span class="rc-fare">₹${r.fare.toFixed(2)}</span>
          <span class="rc-seats">${free} seats free</span>
        </div>
      </span>
    </button>`;
  }).join('');

  const block = document.createElement('div');
  block.className = 'route-picker';
  block.innerHTML = `
    <div class="route-picker-title">${mode === 'book' ? 'SELECT A ROUTE TO BOOK' : 'SELECT A ROUTE TO VIEW'}</div>
    <div class="route-cards">${cards}</div>`;
  terminal.appendChild(block);
  terminal.scrollTop = terminal.scrollHeight;
}

function viewRouteSelected(routeID) {
  displaySeatGrid(routeID, false, null);
  state='MENU'; showMenu();
}

function bookRouteSelected(routeID) {
  tempData.routeID = routeID;
  subState = 'SEAT';
  displaySeatGrid(routeID, true, null);
  print('Click a green seat to select it, or type a seat number (1–40): ');
}

// ─────────────────────────────────────────────
// BOOK
// ─────────────────────────────────────────────
function handleBook(val) {
  if (subState==='ROUTE') {
    // Now handled by clickable route cards — this is fallback for typed input
    const r=parseInt(val);
    if(isNaN(r)||r<1||r>MAX_ROUTES){pE('Invalid Route ID.');return;}
    bookRouteSelected(r);
  } else if (subState==='SEAT') {
    // Typed seat number fallback
    const s=parseInt(val);
    if(isNaN(s)||s<1||s>MAX_SEATS){pE('Out of range. Enter 1–40.');print('Click a seat or type a number (1–40): ');return;}
    if(routes[tempData.routeID-1].bookedSeats[s-1]===1){pE('Seat '+s+' is already booked. Choose another.');print('Click a seat or type a number (1–40): ');return;}
    seatSelected(s);
  } else if (subState==='NAME') {
    const name=val.trim();
    if(!name){pE('Name cannot be empty.');print('Enter Passenger Name: ');return;}
    if(/[0-9]/.test(name)){pE('Name cannot contain digits.');print('Enter Passenger Name: ');return;}
    if(bookings.length>=MAX_BOOKINGS){pE('Booking limit reached.');state='MENU';showMenu();return;}
    const r=routes[tempData.routeID-1];
    const tid=nextTicketID++;
    bookings.push({ticketID:tid,routeID:tempData.routeID,seatNumber:tempData.seat,passengerName:name,farePaid:r.fare,isCancelled:false});
    r.bookedSeats[tempData.seat-1]=1;

    const card = document.createElement('div');
    card.className = 'ticket-card';
    card.innerHTML = `
      <div class="ticket-header">
        <span>🎫 BOOKING CONFIRMED</span>
        <span>✓</span>
      </div>
      <div class="ticket-body">
        <span class="ticket-label">Ticket ID</span>   <span class="ticket-value id-val">#${tid}</span>
        <span class="ticket-label">Passenger</span>   <span class="ticket-value">${name}</span>
        <span class="ticket-label">Route</span>       <span class="ticket-value route-val">${r.source} → ${r.destination}</span>
        <span class="ticket-label">Seat</span>        <span class="ticket-value">${tempData.seat}</span>
        <span class="ticket-label">Fare Paid</span>   <span class="ticket-value fare-val">₹${r.fare.toFixed(2)}</span>
      </div>
      <div class="ticket-footer">
        <span>Status: ACTIVE ✓</span>
        <span>Route ID: ${tempData.routeID}</span>
      </div>`;
    terminal.appendChild(card);
    terminal.scrollTop = terminal.scrollHeight;
    updateStats();
    state='MENU'; showMenu();
  }
}

// ─────────────────────────────────────────────
// CANCEL
// ─────────────────────────────────────────────
function handleCancel(val) {
  const tid=parseInt(val);
  if(isNaN(tid)){pE('Invalid Ticket ID.');state='MENU';showMenu();return;}
  const b=bookings.find(x=>x.ticketID===tid);
  if(!b)           pE('Ticket ID '+tid+' not found.');
  else if(b.isCancelled) pE('Ticket '+tid+' is already cancelled.');
  else {
    b.isCancelled=true;
    routes[b.routeID-1].bookedSeats[b.seatNumber-1]=0;
    pO('✓ Ticket '+tid+' cancelled. Seat '+b.seatNumber+' on Route '+b.routeID+' is now free.');
  }
  state='MENU'; showMenu();
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
function handleSearch(val) {
  const tid=parseInt(val);
  if(isNaN(tid)){pE('Invalid Ticket ID.');state='MENU';showMenu();return;}
  const b=bookings.find(x=>x.ticketID===tid);
  if(!b) { pE('Ticket ID '+tid+' not found.'); }
  else {
    const r=routes[b.routeID-1];
    const statusLabel = b.isCancelled ? '❌ CANCELLED' : '✅ ACTIVE';
    const card = document.createElement('div');
    card.className = 'ticket-card';
    card.style.borderColor = b.isCancelled ? 'var(--red)' : 'var(--cyan)';
    card.innerHTML = `
      <div class="ticket-header" style="background:${b.isCancelled ? 'linear-gradient(135deg,#ff4566,#aa1133)' : 'linear-gradient(135deg,#00c9ff,#0066aa)'}">
        <span>🎫 TICKET DETAILS</span>
        <span>#${b.ticketID}</span>
      </div>
      <div class="ticket-body">
        <span class="ticket-label">Ticket ID</span>   <span class="ticket-value id-val">#${b.ticketID}</span>
        <span class="ticket-label">Passenger</span>   <span class="ticket-value">${b.passengerName}</span>
        <span class="ticket-label">Route</span>       <span class="ticket-value route-val">${r.source} → ${r.destination}</span>
        <span class="ticket-label">Seat</span>        <span class="ticket-value">${b.seatNumber}</span>
        <span class="ticket-label">Fare Paid</span>   <span class="ticket-value fare-val">₹${b.farePaid.toFixed(2)}</span>
        <span class="ticket-label">Status</span>      <span class="ticket-value ${b.isCancelled?'td-cancel':'td-active'}">${statusLabel}</span>
      </div>
      <div class="ticket-footer">
        <span>Route ID: ${b.routeID}</span>
        <span>Seat: ${b.seatNumber}</span>
      </div>`;
    terminal.appendChild(card);
    terminal.scrollTop = terminal.scrollHeight;
  }
  state='MENU'; showMenu();
}

// ─────────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────────
function handleUpdate(val) {
  if (subState === 'ID') {
    const tid = parseInt(val);
    if (isNaN(tid)) { pE('Invalid Ticket ID.'); state='MENU'; showMenu(); return; }
    const b = bookings.find(x => x.ticketID === tid);
    if (!b) { pE('Ticket ID ' + tid + ' not found.'); state='MENU'; showMenu(); return; }
    if (b.isCancelled) { pE('Cannot update a cancelled ticket.'); state='MENU'; showMenu(); return; }
    tempData.tid = tid;
    subState = 'NAME';
    print('Current Passenger Name: ' + b.passengerName);
    print('Enter New Passenger Name: ');
  } else if (subState === 'NAME') {
    const name = val.trim();
    if (!name) { pE('Name cannot be empty.'); print('Enter New Passenger Name: '); return; }
    if (/[0-9]/.test(name)) { pE('Name cannot contain digits.'); print('Enter New Passenger Name: '); return; }
    const b = bookings.find(x => x.ticketID === tempData.tid);
    const oldName = b.passengerName;
    b.passengerName = name;
    const card = document.createElement('div');
    card.className = 'ticket-card';
    card.style.borderColor = 'var(--cyan)';
    card.innerHTML = `
      <div class="ticket-header" style="background:linear-gradient(135deg,#00c9ff,#0066aa)">
        <span>✏️ BOOKING UPDATED</span>
        <span>#${b.ticketID}</span>
      </div>
      <div class="ticket-body">
        <span class="ticket-label">Ticket ID</span>    <span class="ticket-value id-val">#${b.ticketID}</span>
        <span class="ticket-label">Old Name</span>     <span class="ticket-value" style="color:var(--muted);text-decoration:line-through">${oldName}</span>
        <span class="ticket-label">New Name</span>     <span class="ticket-value">${name}</span>
        <span class="ticket-label">Route</span>        <span class="ticket-value route-val">${routes[b.routeID-1].source} → ${routes[b.routeID-1].destination}</span>
        <span class="ticket-label">Seat</span>         <span class="ticket-value">${b.seatNumber}</span>
      </div>
      <div class="ticket-footer">
        <span>Status: ACTIVE ✓</span>
        <span>Name updated successfully</span>
      </div>`;
    terminal.appendChild(card);
    terminal.scrollTop = terminal.scrollHeight;
    state = 'MENU'; showMenu();
  }
}

// ─────────────────────────────────────────────
// REPORT — real HTML table
// ─────────────────────────────────────────────
function dailyReport() {
  let rows = '';
  let gT=0, gR=0;
  routes.forEach(r=>{
    const act=bookings.filter(b=>b.routeID===r.routeID&&!b.isCancelled);
    const rev=act.reduce((s,b)=>s+b.farePaid,0);
    rows += `<tr>
      <td class="td-id">${r.routeID}</td>
      <td>${r.source}</td>
      <td>${r.destination}</td>
      <td>${act.length}</td>
      <td class="td-rev">₹${rev.toLocaleString('en-IN')}</td>
    </tr>`;
    gT+=act.length; gR+=rev;
  });
  rows += `<tr style="border-top:2px solid var(--accent)">
    <td colspan="3" style="color:var(--accent);font-weight:700;letter-spacing:2px">GRAND TOTAL</td>
    <td style="color:var(--accent);font-weight:700">${gT}</td>
    <td class="td-rev" style="font-size:1.05em">₹${gR.toLocaleString('en-IN')}</td>
  </tr>`;
  const block = document.createElement('div');
  block.className = 't-block';
  block.innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Source</th><th>Destination</th><th>Tickets</th><th>Revenue</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  terminal.appendChild(block);
  terminal.scrollTop = terminal.scrollHeight;
  updateStats();
}

// ─────────────────────────────────────────────
// QUICK BUTTONS
// ─────────────────────────────────────────────
function quickSend(val) {
  inputEl.value = val;
  inputEl.value = '';
  handleInput(val);
  inputEl.focus();
}

// ─────────────────────────────────────────────
// INPUT EVENTS
// ─────────────────────────────────────────────
sendBtn.addEventListener('click', ()=>{const v=inputEl.value;inputEl.value='';handleInput(v);inputEl.focus();});
inputEl.addEventListener('keydown', e=>{if(e.key==='Enter'){const v=inputEl.value;inputEl.value='';handleInput(v);}});
